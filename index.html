<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لينجو سفير - LingoSphere</title>
    <!-- مكتبات التشغيل السريع -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // استدعاء الأيقونات
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        const App = () => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([{ role: 'model', text: 'مرحباً بك في لينجو سفير! أنا معلمك الخاص، كيف يمكنني مساعدتك اليوم؟' }]);
            
            useEffect(() => {
                lucide.createIcons();
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim()) return;
                const userMsg = input;
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setInput('');
                
                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            prompt: userMsg, 
                            systemInstruction: "You are a helpful language tutor. Speak in Arabic and the target language." 
                        })
                    });
                    const data = await res.json();
                    setMessages(prev => [...prev, { role: 'model', text: data.text }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'model', text: 'عذراً، حدث خطأ في الاتصال.' }]);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <header className="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 text-indigo-600 font-bold text-xl">
                                <div className="bg-indigo-600 text-white p-2 rounded-lg">
                                    <Icon name="globe" />
                                </div>
                                <span>لينجو سفير</span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-4xl w-full mx-auto p-4 flex flex-col gap-4">
                        <div className="flex-grow bg-white rounded-2xl shadow-sm border p-4 overflow-y-auto space-y-4 h-[60vh]">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[80%] p-3 rounded-2xl ${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-800'}`}>
                                        {m.text}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="flex gap-2 bg-white p-2 rounded-2xl shadow-md border">
                            <input 
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                className="flex-grow p-3 outline-none"
                                placeholder="اكتب سؤالك هنا..."
                            />
                            <button onClick={handleSend} className="bg-indigo-600 text-white p-3 rounded-xl">
                                <Icon name="send" />
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
